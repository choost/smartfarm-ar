<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartFarm Growth AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: white;
      padding: 10px; font-size: 13px; z-index: 999;
      text-align: center;
    }
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); padding: 10px;
      display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; z-index: 999;
    }
    button {
      padding: 10px 16px; border: none; border-radius: 8px;
      font-size: 13px; cursor: pointer; color: white; font-weight: bold;
    }
    #btn-normal   { background: #2D6A4F; }
    #btn-stress   { background: #333; border: 1px solid #666; }
    #btn-simulate { background: #1B4332; }
    #btn-reset    { background: #555; }
    #feedback {
      position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
      padding: 8px 20px; border-radius: 6px;
      font-size: 13px; font-weight: bold; z-index: 999;
      display: none; white-space: nowrap;
      background: rgba(0,0,0,0.8);
    }
    #feedback.success { color: #52B788; }
    #feedback.danger  { color: #ff6b6b; }
  </style>
</head>
<body>

<div id="header">SmartFarm Growth AR</div>

<div id="controls">
  <button id="btn-normal"   onclick="setMode('normal')">Normal Mode</button>
  <button id="btn-stress"   onclick="setMode('stress')">Stress Mode</button>
  <button id="btn-simulate" onclick="simulate()">Simulate Growth</button>
  <button id="btn-reset"    onclick="resetScene()">Reset</button>
</div>

<div id="feedback"></div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false">

  <a-marker preset="hiro" id="crop-marker">
    <a-entity rotation="75 0 0" position="0 0 0.5">

    <!-- 화분 -->
    <a-cylinder id="pot"
      position="0 0.1 0"
      radius="0.3" height="0.25"
      color="#8B5E3C">
    </a-cylinder>

    <!-- 흙 -->
    <a-cylinder id="soil"
      position="0 0.23 0"
      radius="0.28" height="0.05"
      color="#4a3728">
    </a-cylinder>

    <!-- 씨앗 -->
    <a-sphere id="seed"
      position="0 0.32 0"
      radius="0.08"
      color="#8B6914"
      visible="true">
    </a-sphere>

    <!-- 줄기 -->
    <a-cylinder id="stem"
      position="0 0.6 0"
      radius="0.04" height="0.6"
      color="#3a8c3a"
      visible="false">
    </a-cylinder>

    <!-- 잎 왼쪽 -->
    <a-sphere id="leaf-l"
      position="-0.22 0.72 0"
      radius="0.13"
      color="#52B788"
      scale="1.6 0.7 0.7"
      visible="false">
    </a-sphere>

    <!-- 잎 오른쪽 -->
    <a-sphere id="leaf-r"
      position="0.22 0.82 0"
      radius="0.13"
      color="#40916C"
      scale="1.6 0.7 0.7"
      visible="false">
    </a-sphere>

    <!-- 잎 위 -->
    <a-sphere id="leaf-t"
      position="0 0.95 0"
      radius="0.11"
      color="#74C69D"
      scale="0.8 1.4 0.8"
      visible="false">
    </a-sphere>

    <!-- 열매 -->
    <a-sphere id="fruit"
      position="0.18 1.05 0"
      radius="0.13"
      color="#f4a261"
      visible="false">
    </a-sphere>

    <!-- 상태 텍스트 -->
    <a-text id="status-text"
      value="SEED"
      position="0 1.5 0"
      align="center"
      color="#ffffff"
      width="2.5">
    </a-text>
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  let currentMode  = 'normal';
  let currentStage = 0;

  const colors = {
    normal: {
      pot:   '#8B5E3C',
      seed:  '#8B6914',
      stem:  '#3a8c3a',
      leafL: '#52B788',
      leafR: '#40916C',
      leafT: '#74C69D',
      fruit: '#f4a261',
    },
    stress: {
      pot:   '#4a2e10',
      seed:  '#5a4a0a',
      stem:  '#6b6b10',
      leafL: '#7a7a10',
      leafR: '#696905',
      leafT: '#5a5a08',
      fruit: '#7a5a0a',
    }
  };

  function applyColors(mode) {
    const c = colors[mode];
    document.getElementById('pot').setAttribute('color',    c.pot);
    document.getElementById('seed').setAttribute('color',   c.seed);
    document.getElementById('stem').setAttribute('color',   c.stem);
    document.getElementById('leaf-l').setAttribute('color', c.leafL);
    document.getElementById('leaf-r').setAttribute('color', c.leafR);
    document.getElementById('leaf-t').setAttribute('color', c.leafT);
    document.getElementById('fruit').setAttribute('color',  c.fruit);
  }

  function setMode(mode) {
    currentMode = mode;

    // 버튼 색
    document.getElementById('btn-normal').style.background =
      mode === 'normal' ? '#2D6A4F' : '#333';
    document.getElementById('btn-stress').style.background =
      mode === 'stress' ? '#8B0000' : '#333';

    // 오브젝트 색 즉시 반영
    applyColors(mode);

    // 상태 텍스트 색
    const statusEl = document.getElementById('status-text');
    if (mode === 'stress') {
      statusEl.setAttribute('color', '#ff4444');
      document.getElementById('header').style.background = 'rgba(100,0,0,0.85)';
      document.getElementById('header').textContent = '⚠ STRESS MODE — 불량 환경 시뮬레이션';
    } else {
      statusEl.setAttribute('color', '#ffffff');
      document.getElementById('header').style.background = 'rgba(0,0,0,0.75)';
      document.getElementById('header').textContent = 'SmartFarm Growth AR';
    }
  }

  function simulate() {
    if (currentStage >= 3) return;
    currentStage++;

    const seed   = document.getElementById('seed');
    const stem   = document.getElementById('stem');
    const leafL  = document.getElementById('leaf-l');
    const leafR  = document.getElementById('leaf-r');
    const leafT  = document.getElementById('leaf-t');
    const fruit  = document.getElementById('fruit');
    const status = document.getElementById('status-text');
    const fb     = document.getElementById('feedback');

    if (currentStage === 1) {
      seed.setAttribute('visible', 'false');
      stem.setAttribute('visible', 'true');
      leafL.setAttribute('visible', 'true');
      leafR.setAttribute('visible', 'true');
      status.setAttribute('value', currentMode === 'stress' ? 'WILTING...' : 'SPROUTING');
      document.getElementById('header').textContent = 'Step 1: Seed → Sprout';

    } else if (currentStage === 2) {
      leafT.setAttribute('visible', 'true');
      stem.setAttribute('height', '0.85');
      stem.setAttribute('position', '0 0.72 0');
      status.setAttribute('value', currentMode === 'stress' ? 'STRESSED...' : 'GROWING');
      document.getElementById('header').textContent = 'Step 2: Sprout → Mature';

    } else if (currentStage === 3) {
      fruit.setAttribute('visible', 'true');
      document.getElementById('header').textContent = 'Step 3: Mature → Harvest';

      if (currentMode === 'normal') {
        status.setAttribute('value', 'HARVEST!');
        status.setAttribute('color', '#52B788');
        fb.textContent = '✓ 최적 환경 — 수확 완료!';
        fb.className = 'success';
      } else {
        status.setAttribute('value', 'WILTED');
        status.setAttribute('color', '#ff4444');
        fb.textContent = '⚠ 생육 불량 — 환경값을 확인하세요';
        fb.className = 'danger';
      }
      fb.style.display = 'block';
    }

    // 단계마다 색상 유지
    applyColors(currentMode);
  }

  function resetScene() {
    currentStage = 0;

    document.getElementById('seed').setAttribute('visible',   'true');
    document.getElementById('stem').setAttribute('visible',   'false');
    document.getElementById('leaf-l').setAttribute('visible', 'false');
    document.getElementById('leaf-r').setAttribute('visible', 'false');
    document.getElementById('leaf-t').setAttribute('visible', 'false');
    document.getElementById('fruit').setAttribute('visible',  'false');

    document.getElementById('stem').setAttribute('height',   '0.6');
    document.getElementById('stem').setAttribute('position', '0 0.6 0');

    document.getElementById('status-text').setAttribute('value', 'SEED');
    document.getElementById('status-text').setAttribute('color', currentMode === 'stress' ? '#ff4444' : '#ffffff');
    document.getElementById('feedback').style.display = 'none';

    if (currentMode === 'normal') {
      document.getElementById('header').textContent = 'SmartFarm Growth AR';
      document.getElementById('header').style.background = 'rgba(0,0,0,0.75)';
    } else {
      document.getElementById('header').textContent = '⚠ STRESS MODE — 불량 환경 시뮬레이션';
      document.getElementById('header').style.background = 'rgba(100,0,0,0.85)';
    }

    applyColors(currentMode);
  }
</script>

</body>
</html>
