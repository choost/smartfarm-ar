<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartFarm Growth AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #ui {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 9999;
    }
    #ui > * { pointer-events: auto; }
    #header {
      background: rgba(0,0,0,0.82);
      padding: 8px 12px 6px;
    }
    #header-title {
      text-align: center; font-size: 13px; font-weight: bold;
      color: white; margin-bottom: 6px;
    }
    #env-bar {
      display: flex; justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 6px;
    }
    .env-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .env-label { font-size: 10px; color: rgba(255,255,255,0.55); }
    .env-value { font-size: 14px; font-weight: bold; }
    .env-track { width: 60px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
    .env-fill  { height: 100%; border-radius: 3px; transition: width 0.4s, background 0.4s; }
    #dots {
      position: absolute; top: 108px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px; padding: 4px;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.35);
      transition: background 0.3s;
    }
    .dot.on-n { background: #52B788; border-color: #52B788; }
    .dot.on-s { background: #ff6b6b; border-color: #ff6b6b; }
    #feedback {
      position: absolute; bottom: 62px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); padding: 7px 18px; border-radius: 6px;
      font-size: 12px; font-weight: bold; white-space: nowrap; display: none;
    }
    #feedback.ok  { color: #52B788; }
    #feedback.bad { color: #ff6b6b; }
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); padding: 8px;
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    }
    button {
      padding: 9px 13px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: bold; color: white; cursor: pointer;
    }
    #btn-n  { background: #2D6A4F; }
    #btn-s  { background: #444; border: 1px solid #666; }
    #btn-go { background: #1B4332; }
    #btn-r  { background: #555; }
  </style>
</head>
<body>

<div id="ui">
  <div id="header">
    <div id="header-title">SmartFarm Growth AR</div>
    <div id="env-bar">
      <div class="env-item">
        <span class="env-label">🌡 온도</span>
        <span class="env-value" id="v-temp" style="color:#52B788">24°C</span>
        <div class="env-track"><div class="env-fill" id="f-temp" style="width:45%;background:#52B788"></div></div>
      </div>
      <div class="env-item">
        <span class="env-label">💧 수분</span>
        <span class="env-value" id="v-moist" style="color:#52B788">70%</span>
        <div class="env-track"><div class="env-fill" id="f-moist" style="width:70%;background:#52B788"></div></div>
      </div>
      <div class="env-item">
        <span class="env-label">☀ 조도</span>
        <span class="env-value" id="v-light" style="color:#52B788">80%</span>
        <div class="env-track"><div class="env-fill" id="f-light" style="width:80%;background:#52B788"></div></div>
      </div>
      <div class="env-item">
        <span class="env-label">📊 상태</span>
        <span class="env-value" id="v-state" style="color:#52B788;font-size:11px">최적</span>
      </div>
    </div>
  </div>
  <div id="dots">
    <div class="dot on-n" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <div id="feedback"></div>
  <div id="controls">
    <button id="btn-n"  onclick="setMode('normal')">🌱 Normal</button>
    <button id="btn-s"  onclick="setMode('stress')">⚠ Stress</button>
    <button id="btn-go" onclick="simulate()">Simulate ▶</button>
    <button id="btn-r"  onclick="resetScene()">↺ Reset</button>
  </div>
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false"
  style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;">

  <a-marker preset="hiro">

    <!-- 그룹 전체를 여기서 회전 — 마커 세워서 정면으로 볼 때 기준 -->
    <a-entity id="pg" rotation="0 0 0" position="0 0 0">

      <!-- 화분 -->
      <a-cylinder id="pot"
        position="0 0.12 0" radius="0.3" height="0.28"
        color="#8B5E3C">
      </a-cylinder>

      <!-- 흙 -->
      <a-cylinder id="soil"
        position="0 0.27 0" radius="0.28" height="0.05"
        color="#4a3728">
      </a-cylinder>

      <!-- 씨앗 -->
      <a-sphere id="seed"
        position="0 0.35 0" radius="0.09"
        color="#8B6914" visible="true">
      </a-sphere>

      <!-- 줄기 -->
      <a-cylinder id="stem"
        position="0 0.65 0" radius="0.045" height="0.65"
        color="#3a8c3a" visible="false">
      </a-cylinder>

      <!-- 잎 왼 -->
      <a-sphere id="ll"
        position="-0.22 0.75 0" radius="0.13"
        color="#52B788" scale="1.5 0.7 0.7" visible="false">
      </a-sphere>

      <!-- 잎 오 -->
      <a-sphere id="lr"
        position="0.22 0.82 0" radius="0.13"
        color="#40916C" scale="1.5 0.7 0.7" visible="false">
      </a-sphere>

      <!-- 잎 위 -->
      <a-sphere id="lt"
        position="0 0.96 0" radius="0.11"
        color="#74C69D" scale="0.8 1.3 0.8" visible="false">
      </a-sphere>

      <!-- 큰 잎 왼 -->
      <a-sphere id="lbl"
        position="-0.32 0.84 0" radius="0.17"
        color="#2D6A4F" scale="1.7 0.55 0.8" visible="false">
      </a-sphere>

      <!-- 큰 잎 오 -->
      <a-sphere id="lbr"
        position="0.32 0.90 0" radius="0.17"
        color="#1B4332" scale="1.7 0.55 0.8" visible="false">
      </a-sphere>

      <!-- 열매 1 -->
      <a-sphere id="f1"
        position="0.2 1.1 0" radius="0.13"
        color="#f4a261" visible="false">
      </a-sphere>

      <!-- 열매 2 -->
      <a-sphere id="f2"
        position="-0.16 1.04 0" radius="0.11"
        color="#e76f51" visible="false">
      </a-sphere>

      <!-- 상태 텍스트 -->
      <a-text id="stxt"
        value="SEED" position="0 1.55 0"
        align="center" color="#ffffff" width="2.5">
      </a-text>

    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  let mode  = 'normal';
  let stage = 0;
  const MAX = 5;

  const ENV = {
    normal: { temp:'24°C', moist:'70%', light:'80%', tp:45, mp:70, lp:80, state:'최적', col:'#52B788' },
    stress: { temp:'39°C', moist:'8%',  light:'15%', tp:95, mp:8,  lp:15, state:'불량', col:'#ff6b6b' },
  };

  // Normal 색상
  const NC = {
    pot:'#8B5E3C', soil:'#4a3728', seed:'#8B6914', stem:'#3a8c3a',
    ll:'#52B788', lr:'#40916C', lt:'#74C69D',
    lbl:'#2D6A4F', lbr:'#1B4332', f1:'#f4a261', f2:'#e76f51'
  };

  // Stress 색상
  const SC = {
    pot:'#3d1f08', soil:'#2a1a08', seed:'#4a3a05', stem:'#6b6b10',
    ll:'#7a7210', lr:'#696505', lt:'#5a5508',
    lbl:'#4a4808', lbr:'#3a3806', f1:'#7a5a0a', f2:'#6a4808'
  };

  // Normal 형태
  const NS = {
    pot:  { p:'0 0.12 0',    s:'1 1 1' },
    soil: { p:'0 0.27 0',    s:'1 1 1' },
    seed: { p:'0 0.35 0',    s:'1 1 1' },
    stem: { p:'0 0.65 0',    s:'1 1 1' },
    ll:   { p:'-0.22 0.75 0',s:'1.5 0.7 0.7' },
    lr:   { p:'0.22 0.82 0', s:'1.5 0.7 0.7' },
    lt:   { p:'0 0.96 0',    s:'0.8 1.3 0.8' },
    lbl:  { p:'-0.32 0.84 0',s:'1.7 0.55 0.8' },
    lbr:  { p:'0.32 0.90 0', s:'1.7 0.55 0.8' },
    f1:   { p:'0.2 1.1 0',   s:'1 1 1' },
    f2:   { p:'-0.16 1.04 0',s:'1 1 1' },
  };

  // Stress 형태 (찌그러짐 — scale로만)
  const SS = {
    pot:  { p:'0 0.12 0',    s:'1 1 1' },
    soil: { p:'0 0.27 0',    s:'1 1 1' },
    seed: { p:'0 0.35 0',    s:'0.7 0.6 0.7' },
    stem: { p:'0 0.65 0',    s:'0.6 0.85 0.6' },
    ll:   { p:'-0.22 0.75 0',s:'0.9 0.35 0.5' },
    lr:   { p:'0.22 0.82 0', s:'0.8 0.30 0.5' },
    lt:   { p:'0 0.96 0',    s:'0.4 0.6 0.4' },
    lbl:  { p:'-0.32 0.84 0',s:'0.75 0.25 0.5' },
    lbr:  { p:'0.32 0.90 0', s:'0.75 0.25 0.5' },
    f1:   { p:'0.2 1.1 0',   s:'0.55 0.45 0.55' },
    f2:   { p:'-0.16 1.04 0',s:'0.45 0.38 0.45' },
  };

  const SLABELS = {
    normal: ['SEED','GERMINATING','SPROUTING','GROWING','MATURE','HARVEST!'],
    stress: ['SEED','WILTING...','DROOPING...','STRESSED...','DAMAGED...','WILTED'],
  };
  const SHEADERS = {
    normal: ['SmartFarm Growth AR','Step 1: 발아 시작 🌱','Step 2: 새싹 등장 🌿','Step 3: 잎 성장 중 🍃','Step 4: 성숙 단계 🌳','Step 5: 수확 완료! 🌾'],
    stress: ['⚠ STRESS MODE','Step 1: 발아 부진 ⚠','Step 2: 새싹 시듦 ⚠','Step 3: 잎 손상 ⚠','Step 4: 심각한 손상 ⚠','Step 5: 생육 불량 ✗'],
  };

  function set(id, attr, val) {
    const el = document.getElementById(id);
    if (el) el.setAttribute(attr, val);
  }

  function updateEnv() {
    const e = ENV[mode];
    document.getElementById('v-temp').textContent  = e.temp;
    document.getElementById('v-moist').textContent = e.moist;
    document.getElementById('v-light').textContent = e.light;
    document.getElementById('v-state').textContent = e.state;
    ['v-temp','v-moist','v-light','v-state'].forEach(id =>
      document.getElementById(id).style.color = e.col);
    [['f-temp',e.tp],['f-moist',e.mp],['f-light',e.lp]].forEach(([id,pct]) => {
      const el = document.getElementById(id);
      el.style.width = pct + '%';
      el.style.background = e.col;
    });
  }

  function applyAppearance() {
    const cols   = mode === 'stress' ? SC : NC;
    const shapes = mode === 'stress' ? SS : NS;
    Object.keys(cols).forEach(k   => set(k, 'color', cols[k]));
    Object.keys(shapes).forEach(k => set(k, 'scale', shapes[k].s));
  }

  function updateDots() {
    for (let i = 0; i < MAX; i++) {
      const d = document.getElementById('d' + i);
      d.className = 'dot' + (i < stage ? ' ' + (mode==='stress' ? 'on-s' : 'on-n') : '');
    }
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btn-n').style.background = m==='normal' ? '#2D6A4F' : '#444';
    document.getElementById('btn-s').style.background = m==='stress' ? '#8B0000' : '#444';
    document.getElementById('header').style.background =
      m==='stress' ? 'rgba(100,0,0,0.9)' : 'rgba(0,0,0,0.82)';
    document.getElementById('header-title').textContent = SHEADERS[m][stage];
    set('stxt', 'color', m==='stress' ? '#ff4444' : '#ffffff');
    updateEnv();
    applyAppearance();
    updateDots();
  }

  function simulate() {
    if (stage >= MAX) return;
    stage++;
    if (stage === 1) { set('seed','visible','false'); set('stem','visible','true'); }
    if (stage === 2) { set('ll','visible','true'); set('lr','visible','true'); }
    if (stage === 3) { set('lt','visible','true'); }
    if (stage === 4) { set('lbl','visible','true'); set('lbr','visible','true'); }
    if (stage === 5) {
      set('f1','visible','true'); set('f2','visible','true');
      const fb = document.getElementById('feedback');
      fb.textContent = mode==='normal' ? '✓ 최적 환경 — 수확 완료!' : '✗ 생육 불량 — 환경값을 확인하세요';
      fb.className = mode==='normal' ? 'ok' : 'bad';
      fb.style.display = 'block';
    }
    set('stxt','value', SLABELS[mode][stage]);
    set('stxt','color', mode==='stress' ? '#ff4444' : '#ffffff');
    document.getElementById('header-title').textContent = SHEADERS[mode][stage];
    applyAppearance();
    updateDots();
  }

  function resetScene() {
    stage = 0;
    set('seed','visible','true');
    ['stem','ll','lr','lt','lbl','lbr','f1','f2'].forEach(id => set(id,'visible','false'));
    set('stxt','value','SEED');
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('header-title').textContent = SHEADERS[mode][0];
    applyAppearance();
    updateEnv();
    updateDots();
  }

  updateEnv();
  updateDots();
</script>
</body>
</html>
