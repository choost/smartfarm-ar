<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartFarm Growth AR</title>

  <!-- A-Frame + AR.js CDN -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

    /* 상단 헤더 */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7); color: white;
      padding: 8px 12px; font-size: 13px; z-index: 999;
      text-align: center;
    }

    /* 하단 버튼 바 */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8); padding: 10px;
      display: flex; gap: 8px; justify-content: center;
      z-index: 999;
    }
    button {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 13px; cursor: pointer; color: white;
    }
    #btn-normal   { background: #2D6A4F; }
    #btn-stress   { background: #333; border: 1px solid #666; }
    #btn-simulate { background: #1B4332; }
    #btn-reset    { background: #444; }

    /* 결과 피드백 */
    #feedback {
      position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #52B788;
      padding: 8px 20px; border-radius: 6px;
      font-size: 13px; z-index: 999; display: none;
    }
    #feedback.stress { color: #ff6b6b; }
  </style>
</head>
<body>

<!-- UI 오버레이 -->
<div id="header">SmartFarm Growth AR</div>

<div id="controls">
  <button id="btn-normal"   onclick="setMode('normal')">Normal Mode</button>
  <button id="btn-stress"   onclick="setMode('stress')">Stress Mode</button>
  <button id="btn-simulate" onclick="simulate()">Simulate Growth</button>
  <button id="btn-reset"    onclick="resetScene()">Reset</button>
</div>

<div id="feedback"></div>

<!-- AR 씬 -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false">

  <!-- ── Crop 마커: 식물 3D 오브젝트 ── -->
  <a-marker preset="hiro" id="crop-marker">

    <!-- 화분 -->
    <a-cylinder id="pot"
      position="0 0.1 0"
      radius="0.3" height="0.25"
      color="#8B5E3C">
    </a-cylinder>

    <!-- 흙 -->
    <a-cylinder
      position="0 0.23 0"
      radius="0.28" height="0.05"
      color="#4a3728">
    </a-cylinder>

    <!-- 씨앗 (Seed 단계) -->
    <a-sphere id="seed"
      position="0 0.32 0"
      radius="0.08"
      color="#8B6914"
      visible="true">
    </a-sphere>

    <!-- 새싹 줄기 (Sprout 단계) -->
    <a-cylinder id="stem"
      position="0 0.6 0"
      radius="0.04" height="0.6"
      color="#3a8c3a"
      visible="false">
    </a-cylinder>

    <!-- 잎 왼쪽 -->
    <a-ellipse id="leaf-l"
      position="-0.2 0.7 0"
      width="0.3" height="0.15"
      rotation="0 0 -30"
      color="#52B788"
      visible="false">
    </a-ellipse>

    <!-- 잎 오른쪽 -->
    <a-ellipse id="leaf-r"
      position="0.2 0.8 0"
      width="0.3" height="0.15"
      rotation="0 0 30"
      color="#40916C"
      visible="false">
    </a-ellipse>

    <!-- 열매 (Harvest 단계) -->
    <a-sphere id="fruit"
      position="0.15 1.0 0"
      radius="0.12"
      color="#f4a261"
      visible="false">
    </a-sphere>

    <!-- 상태 텍스트 -->
    <a-text id="status-text"
      value="SEED"
      position="0 1.4 0"
      align="center"
      color="#ffffff"
      background-color="#111111"
      width="2">
    </a-text>

  </a-marker>

  <!-- ── Env 마커: 환경 제어 패널 ── -->
  <a-marker type="pattern" url="markers/env-marker.patt" id="env-marker">

    <!-- 환경 정보 패널 배경 -->
    <a-plane
      position="0 0.5 0"
      rotation="-90 0 0"
      width="1.8" height="1.2"
      color="#111111"
      opacity="0.85">
    </a-plane>

    <!-- 환경 텍스트 -->
    <a-text id="env-text"
      value="온도: 24°C\n수분: 70%\n조도: 80%"
      position="0 0.5 0.01"
      rotation="-90 0 0"
      align="center"
      color="#74C69D"
      width="1.6">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>


<script>
  // ── 상태 관리 ───────────────────────────────────────────
  let currentMode   = 'normal';
  let currentStage  = 0; // 0:seed 1:sprout 2:mature 3:harvest

  // 환경 파라미터 (Normal / Stress)
  const envParams = {
    normal: { temp: 24, moist: 70, light: 80 },
    stress: { temp: 39, moist: 8,  light: 15 },
  };

  // ── 모드 전환 ───────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    const p = envParams[mode];
    document.getElementById('env-text').setAttribute('value',
      `온도: ${p.temp}°C\n수분: ${p.moist}%\n조도: ${p.light}%`
    );

    // 버튼 스타일
    document.getElementById('btn-normal').style.background =
      mode === 'normal' ? '#2D6A4F' : '#333';
    document.getElementById('btn-stress').style.background =
      mode === 'stress' ? '#8B0000' : '#333';

    // Stress 모드면 식물 색상 변경
    if (mode === 'stress') {
      document.getElementById('leaf-l').setAttribute('color', '#8B8B1A');
      document.getElementById('leaf-r').setAttribute('color', '#7A7A15');
      document.getElementById('env-text').setAttribute('color', '#ff6b6b');
    } else {
      document.getElementById('leaf-l').setAttribute('color', '#52B788');
      document.getElementById('leaf-r').setAttribute('color', '#40916C');
      document.getElementById('env-text').setAttribute('color', '#74C69D');
    }
  }

  // ── 성장 시뮬레이션 ─────────────────────────────────────
  function simulate() {
    if (currentStage >= 3) return;
    currentStage++;
    updateStage(currentStage);
  }

  function updateStage(stage) {
    const seed   = document.getElementById('seed');
    const stem   = document.getElementById('stem');
    const leafL  = document.getElementById('leaf-l');
    const leafR  = document.getElementById('leaf-r');
    const fruit  = document.getElementById('fruit');
    const status = document.getElementById('status-text');
    const fb     = document.getElementById('feedback');

    // 단계별 표시
    if (stage === 1) {
      // Sprout 단계
      seed.setAttribute('visible', 'false');
      stem.setAttribute('visible', 'true');
      leafL.setAttribute('visible', 'true');
      leafR.setAttribute('visible', 'true');
      status.setAttribute('value', 'SPROUTING');
      showHeader('Step 1: Seed → Sprout 단계');

    } else if (stage === 2) {
      // Mature 단계: 잎 커지기
      leafL.setAttribute('width', '0.5');
      leafR.setAttribute('width', '0.5');
      stem.setAttribute('height', '0.9');
      stem.setAttribute('position', '0 0.75 0');
      status.setAttribute('value', 'GROWING');
      showHeader('Step 2: Sprout → Mature 단계');

    } else if (stage === 3) {
      // Harvest 단계
      fruit.setAttribute('visible', 'true');
      status.setAttribute('value', 'HARVEST');
      showHeader('Step 3: Mature → Harvest 단계');

      // 결과 피드백
      if (currentMode === 'normal') {
        fb.textContent = '✓ 최적 환경 — 수확 완료!';
        fb.className = '';
        fb.style.display = 'block';
      } else {
        fb.textContent = '⚠ 생육 불량 — 환경값을 확인하세요';
        fb.className = 'stress';
        fb.style.display = 'block';
      }
    }
  }

  // ── 리셋 ────────────────────────────────────────────────
  function resetScene() {
    currentStage = 0;

    document.getElementById('seed').setAttribute('visible', 'true');
    document.getElementById('stem').setAttribute('visible', 'false');
    document.getElementById('leaf-l').setAttribute('visible', 'false');
    document.getElementById('leaf-r').setAttribute('visible', 'false');
    document.getElementById('fruit').setAttribute('visible', 'false');
    document.getElementById('leaf-l').setAttribute('width', '0.3');
    document.getElementById('leaf-r').setAttribute('width', '0.3');
    document.getElementById('stem').setAttribute('height', '0.6');
    document.getElementById('stem').setAttribute('position', '0 0.6 0');
    document.getElementById('status-text').setAttribute('value', 'SEED');
    document.getElementById('header').textContent = 'SmartFarm Growth AR';
    document.getElementById('feedback').style.display = 'none';
  }

  // ── 헤더 텍스트 업데이트 ────────────────────────────────
  function showHeader(text) {
    document.getElementById('header').textContent = text;
  }
</script>

</body>
</html>
